<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Krystal's Union Dashboard, a personal space to digest her reading, interrupt old stories with her union self, and journal weekly.">
<title>Krystal's Union Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Jost:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #2a1640; --card: rgba(255,255,255,0.07); --text: #f5eefb; --muted: #c2aed8; --muted-2: #9880b8;
    --gold: #c9a548; --gold-soft: #e8d5a0; --violet: #a988e8; --periwinkle: #8ca8e8;
    --line: rgba(255,255,255,0.14); --line-strong: rgba(255,255,255,0.26);
  }
  body {
    background: radial-gradient(ellipse at 15% 0%, #4a2c6e60 0%, transparent 55%),
                radial-gradient(ellipse at 88% 10%, #8ca8e830 0%, transparent 48%),
                radial-gradient(ellipse at 50% 105%, #c9a54830 0%, transparent 55%), var(--bg);
    color: var(--text); font-family: 'Jost', sans-serif; font-weight: 300; min-height: 100vh; position: relative;
  }
  #sparkles { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .spark { position: absolute; border-radius: 50%; background: radial-gradient(circle, #fff, var(--violet) 70%, transparent 100%); animation: twinkle 4.5s ease-in-out infinite; }
  @keyframes twinkle { 0%,100%{opacity:.15;transform:scale(.7);} 50%{opacity:.8;transform:scale(1.25);} }
  #app { position: relative; z-index: 2; max-width: 660px; margin: 0 auto; padding: 0 20px 60px; }
  h1, h2, h3 { font-family: 'Playfair Display', serif; color: var(--text); margin-bottom: 12px; }
  h1 { font-weight: 700; font-size: 28px; line-height: 1.28; }
  h2 { font-weight: 600; font-size: 22px; }
  h3 { font-weight: 600; font-size: 16.5px; }
  p { line-height: 1.75; color: var(--muted); font-size: 14.5px; margin-bottom: 14px; }
  em.hl { font-style: italic; color: var(--gold-soft); }
  .tagline { font-family: 'Playfair Display', serif; font-style: italic; color: var(--gold-soft); font-size: 17px; text-align: center; margin: 16px 0; }
  .center { text-align: center; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 22px; margin-bottom: 16px; backdrop-filter: blur(8px); }
  .card.ritual { background: linear-gradient(150deg, rgba(201,165,72,0.12), rgba(140,168,232,0.10)); border-color: var(--line-strong); }
  .btn { display: inline-flex; align-items: center; gap: 8px; font-family: 'Jost', sans-serif; font-weight: 700; font-size: 14px; padding: 13px 26px; border-radius: 999px; border: none; cursor: pointer; text-decoration: none; }
  .btn.gold { background: linear-gradient(135deg, var(--gold-soft), var(--gold)); color: #2a1640; box-shadow: 0 6px 20px rgba(201,165,72,0.3); }
  .btn.ghost { background: transparent; color: var(--muted); border: 1px solid var(--line-strong); }
  .btn.small { padding: 8px 16px; font-size: 12px; }
  .btn-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 18px; }
  textarea { width: 100%; background: rgba(0,0,0,0.18); border: 1px solid var(--line); border-radius: 12px; color: var(--text); font-family: 'Jost', sans-serif; font-size: 14.5px; padding: 13px; resize: vertical; min-height: 72px; margin-bottom: 14px; }
  .journal-q { font-size: 13.5px; color: var(--text); margin-bottom: 6px; font-weight: 500; }
  .topbar-left { display: flex; align-items: center; gap: 12px; justify-content: center; margin: 36px 0 10px; }
  .topbar-icon { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, var(--gold-soft), var(--violet)); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .topbar-title { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 17px; }

  .topnav-wrap { position: sticky; top: 0; z-index: 10; padding: 16px 0 12px; }
  .topnav-brand-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .topnav-brand { display: flex; align-items: center; gap: 8px; cursor: pointer; opacity: 0.9; }
  .topnav-brand .icon { width: 26px; height: 26px; border-radius: 8px; background: linear-gradient(135deg, var(--gold-soft), var(--violet)); display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
  .topnav-brand .name { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 13px; }
  .tabs { display: flex; gap: 6px; overflow-x: auto; justify-content: center; flex-wrap: wrap; }
  .tab { flex-shrink: 0; font-family: 'Jost', sans-serif; font-weight: 600; font-size: 12px; background: var(--card); border: 1px solid var(--line); color: var(--muted); border-radius: 999px; padding: 9px 15px; cursor: pointer; }
  .tab.active { background: linear-gradient(135deg, var(--gold-soft), var(--violet)); color: #2a1640; border-color: transparent; font-weight: 700; }

  .flip-scene { perspective: 1200px; display: flex; justify-content: center; margin-bottom: 20px; }
  .flip-card { position: relative; width: 220px; height: 300px; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(.2,.8,.2,1); cursor: pointer; }
  .flip-card.flipped { transform: rotateY(180deg); }
  .flip-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 22px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 20px; text-align: center; box-shadow: 0 16px 40px rgba(0,0,0,0.3); }
  .flip-back { background: linear-gradient(160deg, #6b4fa0, var(--violet)); border: 2px solid rgba(255,255,255,0.5); }
  .flip-front { transform: rotateY(180deg); background: linear-gradient(160deg, #6b4fa0, #8ca8e8); border: 2px solid rgba(255,255,255,0.5); }
  .card-name { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; color: #fff; margin-top: 8px; }
  .card-message { font-size: 13px; color: rgba(255,255,255,0.92); font-style: italic; margin-top: 12px; line-height: 1.6; }

  .affirm-grid { display: flex; flex-direction: column; gap: 10px; margin: 14px 0; }
  .affirm-card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; font-family: 'Playfair Display', serif; font-style: italic; font-size: 15px; color: var(--gold-soft); cursor: pointer; }
  .affirm-card:hover { border-color: var(--gold); }

  .step-progress { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1px; color: var(--muted-2); text-align: center; margin-bottom: 8px; }
  .step-dots { display: flex; gap: 6px; justify-content: center; margin-bottom: 18px; }
  .step-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--line-strong); }
  .step-dot.active { background: var(--gold); width: 20px; border-radius: 4px; }

  .entry { border-bottom: 1px solid var(--line); padding-bottom: 16px; margin-bottom: 16px; }
  .entry:last-child { border: none; margin: 0; padding: 0; }
  .entry .tt { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; color: var(--gold-soft); margin-bottom: 2px; }
  .entry .meta { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted-2); margin-bottom: 8px; }
  .entry .q { font-size: 12px; color: var(--muted-2); margin-bottom: 2px; }
  .entry .a { font-size: 13.5px; color: var(--text); margin-bottom: 8px; }
  .save-reminder { background: rgba(201,165,72,0.10); border: 1px solid var(--gold); border-radius: 14px; padding: 14px 18px; font-size: 13px; color: var(--muted); margin-bottom: 20px; display: flex; gap: 10px; align-items: flex-start; }

  .section-label { font-family: 'DM Mono', monospace; font-size: 10.5px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); margin: 20px 0 10px; }

  .site-footer { margin-top: 40px; padding-top: 22px; border-top: 1px solid var(--line); text-align: center; }
  .site-footer .brand { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 14px; margin-bottom: 6px; }
  .site-footer .brand em { font-style: italic; color: var(--gold-soft); }
  .site-footer .links { font-family: 'DM Mono', monospace; font-size: 10.5px; color: var(--muted-2); line-height: 1.9; }
  .site-footer a { color: var(--muted-2); text-decoration: none; }
</style>
</head>
<body>
<div id="sparkles"></div>
<div id="app"></div>

<script>
(function initSparkles() {
  const wrap = document.getElementById("sparkles");
  for (let i = 0; i < 16; i++) {
    const s = document.createElement("div");
    s.className = "spark";
    const size = 2 + Math.random() * 4;
    s.style.width = size + "px"; s.style.height = size + "px";
    s.style.left = Math.random() * 100 + "%"; s.style.top = Math.random() * 100 + "%";
    s.style.animationDelay = (Math.random() * 4.5) + "s";
    wrap.appendChild(s);
  }
})();

/* ---------- DATA, PULLED FROM KRYSTAL'S ACTUAL READING ---------- */

const AFFIRMATIONS = [
  "My union is not something I am waiting for. It is something I am already becoming.",
  "I have already walked through the hardest initiation.",
  "My heart has the strength of an ocean, deep and powerful, never weak.",
  "I do not need evidence to choose a new thought. I only need willingness.",
  "Compassion and boundaries can exist together, especially with family.",
  "I meet my old stories with compassion instead of belief.",
  "I am on track. Everything I am doing right now is aligned.",
  "My emotions are here to help me manifest, not hold me back.",
  "I offer my inner child comfort, then let my union self speak a gentler truth.",
  "I am not fixing something broken. I am simply continuing to unfold."
];

const INTERRUPT_STEPS = [
  { title: "Notice", prompt: "What's the fear-driven thought showing up right now?" },
  { title: "Ask Why", prompt: "Why do you think this thought showed up? What is it afraid of?" },
  { title: "Journal It Out", prompt: "Let it all out here, no filter needed." },
  { title: "Offer Inner Child Comfort", prompt: "What would you say to comfort the younger part of you that believes this?" },
  { title: "Let Your Union Self Respond", prompt: "What's a gentler, truer possibility your union self would offer instead?" }
];

const WEEKLY_PROMPTS = [
  "What old story tried to run the show this week?",
  "Where did you choose your union self over the fear-driven thought?",
  "How did you hold both compassion and boundaries with family this week?",
  "What's one way your heart felt like an ocean this week, deep, not weak?"
];

const DECK = [
  { name: "The Fool", glyph: "\u2726", c2: "#D96BA8", message: "Take a leap of faith in love today. Approach this connection with curiosity and innocence instead of overanalyzing every step. Union favors those who stay open." },
  { name: "The Magician", glyph: "\u2737", c2: "#7B54C4", message: "You have everything you need to manifest this connection right now. Focus your intention clearly, then take aligned action instead of waiting for permission." },
  { name: "The High Priestess", glyph: "\u263E", c2: "#2FA98C", message: "Trust your intuition over what anyone else says about this connection, including advice, including this card. Your inner knowing is the real guide today." },
  { name: "The Empress", glyph: "\u2740", c2: "#E09A3E", message: "Nurture yourself first today. Your abundance, warmth, and creativity are what make you magnetic, not proving anything to anyone." },
  { name: "The Lovers", glyph: "\u2661", c2: "#E06B3E", message: "This is a day for real alignment. Notice where your values and this connection's values genuinely match, not just the chemistry." },
  { name: "Strength", glyph: "\u221E", c2: "#2F9EC4", message: "Approach this connection with gentle, patient power today. Real strength here looks like calm consistency, not control." },
  { name: "The Star", glyph: "\u2605", c2: "#8B7BC4", message: "Have hope today. Even in uncertainty, you're being guided toward healing and toward union, one small step at a time." },
  { name: "The Sun", glyph: "\u2600", c2: "#C49A2E", message: "Let joy lead today. Union thrives in warmth, playfulness, and genuine happiness, not just seriousness and effort." },
  { name: "The World", glyph: "\u25C9", c2: "#7B54C4", message: "You're closer to completion and wholeness than you realize today. Celebrate how far you've come in this journey." },
  { name: "Ten of Cups", glyph: "\u2665", c2: "#D96BA8", message: "Envision the emotional harmony you're building toward today. This connection can hold real, lasting happiness." },
  { name: "Queen of Cups", glyph: "\u2665", c2: "#D96BA8", message: "Tend to your emotions today. Let your divine feminine energy, your sensitivity, and your open heart be your superpower, not something to apologize for." },
  { name: "Two of Cups", glyph: "\u2665", c2: "#D96BA8", message: "Focus today on the actual energy exchange in this connection, how you give love, how you receive it, and the simple day-to-day feeling of being close to someone." },
  { name: "Queen of Swords", glyph: "\u2660", c2: "#5E8CD4", message: "Speak your truth today, clearly and without apology. Honesty is an act of love here." },
  { name: "Nine of Swords", glyph: "\u2660", c2: "#5E8CD4", message: "Your anxious thoughts are louder than the truth today. Ask yourself what's actually true versus what fear is telling you." },
  { name: "Nine of Pentacles", glyph: "\u2663", c2: "#4E9E5F", message: "You are allowed to feel secure and abundant today, on your own, independent of what this connection is doing." },
  { name: "Queen of Pentacles", glyph: "\u2663", c2: "#4E9E5F", message: "Nurture yourself and this connection today with practical, grounded care, a good meal, rest, tending to your body." }
];

/* ---------- STATE ---------- */

let state = {
  activeTab: "welcome",
  interruptStep: 0, interruptAnswers: {}, savedInterrupts: [],
  cardDrawn: null, cardFlipped: false,
  weeks: []
};

const STORAGE_KEY = "krystal-union-dashboard-v1";
function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {} }
function loadState() { try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) state = { ...state, ...JSON.parse(raw) }; } catch (e) {} }
function go(patch) { state = { ...state, ...patch }; render(); }

/* ---------- CHROME ---------- */

function topNav() {
  const tabs = [
    { id: "welcome", label: "Welcome" },
    { id: "interrupt", label: "The Interrupt Practice" },
    { id: "affirm", label: "Affirmations" },
    { id: "cardpull", label: "Card Pull" },
    { id: "journal", label: "Weekly Journal" }
  ];
  return `<div class="topnav-wrap">
    <div class="topnav-brand-row">
      <div class="topnav-brand" onclick="go({activeTab:'welcome'})"><div class="icon">\u{1F49C}</div><div class="name">Krystal's Union Dashboard</div></div>
    </div>
    <div class="tabs">${tabs.map(t => `<div class="tab ${state.activeTab === t.id ? "active" : ""}" onclick="go({activeTab:'${t.id}'})">${t.label}</div>`).join("")}</div>
  </div>`;
}

function footer() {
  return `<div class="site-footer">
    <div class="brand">Luana <em>Spirits</em></div>
    <div class="links">
      <a href="mailto:luana@luanaspirits.com">luana@luanaspirits.com</a> &middot;
      <a href="https://docs.google.com/document/d/12oUQEXXesDmVw_XEZH-GEc8NVbtFYyLYf3359hvxyFE/edit?usp=sharing" target="_blank" rel="noopener">Privacy Policy</a> &middot;
      <a href="https://docs.google.com/document/d/1i395On2ZByesCyRaIDocu1aIguhVxuHBQ1l_nPfVReQ/edit?usp=sharing" target="_blank" rel="noopener">Terms &amp; Conditions</a> &middot; &copy; 2026
    </div>
  </div>`;
}

/* ---------- WELCOME ---------- */

function welcomeHtml() {
  return `
    <div class="topbar-left"><div class="topbar-icon">\u{1F49C}</div><div class="topbar-title">Welcome, Krystal</div></div>
    <h2 class="center">Your Pattern: The Old Story vs. Your Union Self</h2>
    <div class="card ritual">
      <p style="margin-bottom:0; color:var(--text);">Your reading named something really clear: you are not fixing something broken. You are simply continuing to interrupt the mind's old stories the moment they arise, meeting them with compassion instead of belief. This dashboard is built to help you actually practice that, not just remember it.</p>
    </div>
    <div class="card">
      <p style="margin-bottom:0;">You've already walked through the hardest initiation. What's ahead now is the unfolding of what you've already built. Your heart has the strength of an ocean, deep and powerful, never weak. That's not a weakness, it's exactly what's helping you manifest.</p>
    </div>
    <div class="tagline">Your union is not something you are waiting for. It is something you are already becoming.</div>
    <div class="btn-row" style="justify-content:center;">
      <button class="btn gold" onclick="go({activeTab:'interrupt'})">Start The Interrupt Practice &rarr;</button>
    </div>
  `;
}

/* ---------- INTERRUPT PRACTICE ---------- */

function interruptHtml() {
  const step = INTERRUPT_STEPS[state.interruptStep];
  const isLast = state.interruptStep === INTERRUPT_STEPS.length - 1;
  const dots = INTERRUPT_STEPS.map((s, i) => `<div class="step-dot ${i === state.interruptStep ? "active" : ""}"></div>`).join("");
  return `
    <h2>\u{1F338} The Interrupt Practice</h2>
    <p>Straight from your own reading: when a fear-driven thought shows up, pause before you let it steer you. This walks you through exactly that, step by step.</p>
    <div class="step-progress">STEP ${state.interruptStep + 1} OF ${INTERRUPT_STEPS.length}</div>
    <div class="step-dots">${dots}</div>
    <div class="card">
      <h3>${step.title}</h3>
      <div class="journal-q">${step.prompt}</div>
      <textarea id="interruptField">${state.interruptAnswers[state.interruptStep] || ""}</textarea>
    </div>
    <div class="btn-row">
      ${state.interruptStep > 0 ? `<button class="btn ghost" onclick="interruptNav(-1)">&larr; Back</button>` : ""}
      ${isLast ? `<button class="btn gold" onclick="saveInterrupt()">Save This Practice</button>` : `<button class="btn gold" onclick="interruptNav(1)">Continue &rarr;</button>`}
    </div>
  `;
}

function interruptNav(dir) {
  state.interruptAnswers[state.interruptStep] = document.getElementById("interruptField").value;
  go({ interruptStep: state.interruptStep + dir });
}

function saveInterrupt() {
  state.interruptAnswers[state.interruptStep] = document.getElementById("interruptField").value;
  state.savedInterrupts.push({ date: new Date().toLocaleString(), answers: { ...state.interruptAnswers } });
  go({ interruptStep: 0, interruptAnswers: {}, activeTab: "journal" });
}

/* ---------- AFFIRMATIONS ---------- */

function affirmHtml() {
  const cards = AFFIRMATIONS.map(a => `<div class="affirm-card">"${a}"</div>`).join("");
  return `
    <h2>\u2728 Affirmations, From Your Own Reading</h2>
    <p>Every line here came from your own reading, nothing generic. Read one whenever you need to hear it again.</p>
    <div class="affirm-grid">${cards}</div>
  `;
}

/* ---------- CARD PULL ---------- */

function cardPullHtml() {
  if (!state.cardDrawn) {
    return `
      <h2 class="center">\u{1F0CF} A Card To Digest Your Reading</h2>
      <p class="center">Ground yourself, hold your reading in mind, and pull a card for extra guidance whenever you need it.</p>
      <div class="btn-row" style="justify-content:center;"><button class="btn gold" onclick="drawCard()">Pull A Card &rarr;</button></div>
    `;
  }
  const c = state.cardDrawn;
  return `
    <h2 class="center">\u2727 Your Card \u2727</h2>
    <div class="flip-scene">
      <div class="flip-card ${state.cardFlipped ? "flipped" : ""}" onclick="go({cardFlipped:true})">
        <div class="flip-face flip-back"><span style="font-size:30px;color:rgba(255,255,255,0.7);">\u2726</span></div>
        <div class="flip-face flip-front">
          <div style="font-size:32px;">${c.glyph}</div>
          <div class="card-name">${c.name}</div>
          ${state.cardFlipped ? `<div class="card-message">${c.message}</div>` : ""}
        </div>
      </div>
    </div>
    <div class="btn-row" style="justify-content:center;">
      <button class="btn ghost" onclick="go({cardDrawn:null, cardFlipped:false})">Pull Another Card</button>
    </div>
  `;
}

function drawCard() {
  const card = DECK[Math.floor(Math.random() * DECK.length)];
  go({ cardDrawn: card, cardFlipped: false });
}

/* ---------- WEEKLY JOURNAL ---------- */

function journalHtml() {
  const fields = WEEKLY_PROMPTS.map((q, i) => `<div class="journal-q">${q}</div><textarea id="wk-${i}"></textarea>`).join("");
  const pastWeeks = [...state.weeks].reverse().map((w, idx) => {
    const qas = WEEKLY_PROMPTS.map((q, i) => w.answers[i] ? `<div class="q">${q}</div><div class="a">${w.answers[i]}</div>` : "").join("");
    return `<div class="entry"><div class="tt">Week of ${w.date}</div>${qas}</div>`;
  }).join("");
  const pastPractices = [...state.savedInterrupts].reverse().map(p => {
    const qas = INTERRUPT_STEPS.map((s, i) => p.answers[i] ? `<div class="q">${s.title}</div><div class="a">${p.answers[i]}</div>` : "").join("");
    return `<div class="entry"><div class="tt">\u{1F338} Interrupt Practice</div><div class="meta">${p.date}</div>${qas}</div>`;
  }).join("");
  return `
    <h2>\u{1F4D3} Weekly Journal</h2>
    <div class="save-reminder"><span>\u{1F49C}</span><span><strong>Your entries save automatically</strong> in this browser, on this device. Download it now and then if you want a backup you can keep.</span></div>
    <div class="card">${fields}
      <button class="btn gold small" onclick="saveWeek()">Save This Week</button>
    </div>
    ${pastPractices ? `<div class="section-label">Your Saved Interrupt Practices</div>${pastPractices}` : ""}
    ${pastWeeks ? `<div class="section-label">Past Weeks</div>${pastWeeks}` : ""}
    <div class="btn-row"><button class="btn gold" onclick="downloadJournal()">Download My Journal</button></div>
  `;
}

function saveWeek() {
  const answers = {};
  WEEKLY_PROMPTS.forEach((q, i) => { answers[i] = document.getElementById("wk-" + i).value; });
  state.weeks.push({ date: new Date().toLocaleDateString(), answers });
  render();
}

function downloadJournal() {
  let text = "KRYSTAL'S UNION DASHBOARD\nWeekly Journal\n\n";
  if (state.weeks.length) {
    text += "== WEEKLY CHECK-INS ==\n\n";
    [...state.weeks].reverse().forEach(w => {
      text += "Week of " + w.date + "\n";
      WEEKLY_PROMPTS.forEach((q, i) => { if (w.answers[i]) text += q + "\n" + w.answers[i] + "\n\n"; });
    });
  }
  if (state.savedInterrupts.length) {
    text += "== INTERRUPT PRACTICES ==\n\n";
    [...state.savedInterrupts].reverse().forEach(p => {
      text += p.date + "\n";
      INTERRUPT_STEPS.forEach((s, i) => { if (p.answers[i]) text += s.title + ": " + p.answers[i] + "\n"; });
      text += "\n";
    });
  }
  if (!state.weeks.length && !state.savedInterrupts.length) text += "No entries yet.\n";
  const blob = new Blob([text], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "krystals-union-journal.txt";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ---------- ROUTER ---------- */

function render() {
  saveState();
  let content = "";
  if (state.activeTab === "welcome") content = welcomeHtml();
  else if (state.activeTab === "interrupt") content = interruptHtml();
  else if (state.activeTab === "affirm") content = affirmHtml();
  else if (state.activeTab === "cardpull") content = cardPullHtml();
  else if (state.activeTab === "journal") content = journalHtml();

  document.getElementById("app").innerHTML = `${topNav()}${content}${footer()}`;
}

loadState();
render();
</script>
</body>
</html>
